<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Navbar</title>
  <script src="https://kit.fontawesome.com/7e5b2d153f.js"  crossorigin="anonymous"></script>
  <script defer src="index.js"></script>

</head>

<body>

  <header class="header">
    <nav class="nav">
      <a href="#" class="logo nav-link">Logo</a>
      <!-- creamos el botton del logo -->
      <button class="nav-toggle" aria-label="Abrir menu">
        <i class="fas fa-bars"></i>
      </button>
      <!-- creamos un listado de la barra de navegacion -->
      <ul class="nav-menu nav-menu_visible">
        <!-- dividimos la barra en las partes -->
        <li class="nav-menu-item">
          <a href="#" class="nav-menu-link nav-link" >Blog</a>
        </li>
        <li class="nav-menu-item">
          <a href="#" class="nav-menu-link nav-link">Videos</a>
        </li>
        <li class="nav-menu-item">
          <a href="#" class="nav-menu-link nav-link">Sobre mi</a>
        </li>
        <li class="nav-menu-item">
          <a href="#" class="nav-menu-link nav-link nav-menu-link:active">Contacto</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <h1>Body</h1>
  </main>

</body>
</html>
